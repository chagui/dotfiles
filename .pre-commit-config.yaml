default_stages: [pre-commit]
repos:
  - repo: https://github.com/JohnnyMorganz/StyLua
    rev: v2.4.1
    hooks:
      - id: stylua

  # p10k.zsh is generated by `p10k configure` and uses zsh-only constructs
  # (e.g. `() { … }` anonymous functions) that shellcheck and shfmt — both
  # bash-targeted — can't parse, leading to false positives or destructive
  # reformats. Excluded narrowly; other hand-written .zsh files in this repo
  # stay POSIX/bash-compatible and remain in scope.
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        exclude: '\.tmpl$|p10k\.zsh$'

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        exclude: '\.tmpl$|p10k\.zsh$'

  - repo: https://github.com/crate-ci/typos
    rev: v1.45.1
    hooks:
      - id: typos
        # Same file: p10k's generated tokens trip typos' English-typo
        # heuristics and get rewritten destructively. The file is regenerated
        # by `p10k configure`, so an inline allow-list would rot.
        exclude: 'p10k\.zsh$'

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  # out of the box hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
        exclude: '^\.chezmoiscripts/'
      - id: check-toml
        exclude: '\.tmpl$'
      - id: check-yaml
        exclude: '\.tmpl$'
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]

  # Skips silently if `ghostty` is not on PATH (e.g. on Linux dev boxes).
  # Note: validates the .tmpl as-is. The file currently has no Go-template
  # syntax, so chezmoi passes it through unchanged. If templating is added
  # later, render via `chezmoi execute-template` before validating.
  - repo: local
    hooks:
      - id: ghostty-validate-config
        name: validate ghostty config
        entry: bash -c 'command -v ghostty >/dev/null || exit 0; for f in "$@"; do ghostty +validate-config --config-file="$f" || exit 1; done' --
        language: system
        files: '^dot_config/ghostty/.*\.tmpl$'

  - repo: meta
    hooks:
      - id: check-hooks-apply
        name: check hooks apply to the repository
      - id: check-useless-excludes
        name: check for useless excludes
