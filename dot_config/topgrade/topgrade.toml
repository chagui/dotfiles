[misc]
# Disable specific steps - same options as the command line flag
disable = [
    "asdf",
    "chezmoi",
    "containers",
    "gem",
    "pnpm",
    "ruby_gems",
    "system",
    "vim",
]

[cargo]
# cargo-nextest requires --locked which cargo-install-update doesn't support
excluded_crates = ["cargo-nextest"]

[commands]
"Update cargo-nextest" = "cargo binstall --no-confirm cargo-nextest"
